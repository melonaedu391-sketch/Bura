name: mezmur_hub
description: "ደቂቀ ትንሣኤ - Ethiopian Mezmur Hub"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  just_audio_background: ^0.0.1+9
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  file_picker: ^6.1.1
  path_provider: ^2.1.2
  google_fonts: ^6.1.0
  lucide_icons: ^0.2.0
  provider: ^6.1.1
  flutter_spinkit: ^5.2.0
  on_audio_query: ^2.9.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
